<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<h1>Admin Dashboard</h1>

<div class="cards">
    <div class="card">Total Users: {{total_users}}</div>
    <div class="card">Total Attendance: {{total_attendance}}</div>
</div>

<canvas id="chart" width="400"></canvas>

<script>
const ctx = document.getElementById('chart');
new Chart(ctx, {
    type: 'bar',
    data: {
        labels: ["Users", "Attendance"],
        datasets: [{
            label: 'Stats',
            data: [{{total_users}}, {{total_attendance}}]
        }]
    }
});
</script>

<h2>Attendance</h2>
<table>
<tr><th>Name</th><th>Date</th><th>Time</th></tr>
{% for a in attendance %}
<tr>
<td>{{a.name}}</td>
<td>{{a.date}}</td>
<td>{{a.time}}</td>
</tr>
{% endfor %}
</table>

<a href="/send_email">Send Email Report</a>
<a href="/logout">Logout</a>

</body>
</html>
